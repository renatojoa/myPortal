<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Renato Araújo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />
  <style>
    body { padding-top: 0; min-height: 100vh; background: var(--bg); }
    .admin-sidebar { width: 220px; min-height: 100vh; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 1.5rem 1rem; flex-shrink: 0; }
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; min-height: 100vh; }
    .admin-nav-link { display: block; padding: 0.5rem 0.75rem; border-radius: 0.5rem; color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; transition: all 0.15s; font-family: "Merriweather Sans", sans-serif; }
    .admin-nav-link:hover, .admin-nav-link.active { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }
    .admin-table th { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); border-color: var(--border); }
    .admin-table td { color: var(--text-primary); border-color: var(--border); vertical-align: middle; font-size: 0.88rem; }
    .admin-table { background: var(--card-bg); }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 2.5rem; width: 100%; max-width: 380px; }
    .modal-content { background: var(--card-bg); color: var(--text-primary); border-color: var(--border); }
    .modal-header, .modal-footer { border-color: var(--border); }
    .form-label { color: var(--text-primary); }
    .drag-handle { cursor: grab; color: var(--text-muted); font-size: 1.15rem; padding: 0 6px; user-select: none; line-height: 1; }
    .drag-handle:active { cursor: grabbing; }
    tr.dragging { opacity: 0.4; background: var(--bg-secondary) !important; }
    tr.drag-over > td:first-child { border-left: 3px solid var(--accent); }
    tr.drag-over { background: color-mix(in srgb, var(--accent) 6%, transparent); }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <h4 class="fw-bold mb-1" style="color:var(--text-primary)">Admin Panel</h4>
    <p class="text-muted mb-4 small">renatojoa.com.br</p>
    <div id="login-error" class="alert alert-danger d-none small"></div>
    <form id="login-form">
      <div class="mb-3">
        <input type="email" class="form-control" id="login-email" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" id="login-password" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="login-btn">Sign In</button>
    </form>
  </div>
</div>

<!-- Admin Layout (hidden until logged in) -->
<div id="admin-app" class="d-none d-flex">
  <div class="admin-sidebar d-flex flex-column">
    <div class="fw-bold mb-4" style="color:var(--text-primary);font-size:1.1rem;font-family:'Merriweather Sans',sans-serif;">⚙ Admin</div>
    <a href="#" class="admin-nav-link active" data-tab="projects"><i class="bi bi-grid me-2"></i>Projects</a>
    <a href="#" class="admin-nav-link" data-tab="skills"><i class="bi bi-tools me-2"></i>Skills</a>
    <a href="#" class="admin-nav-link" data-tab="companies"><i class="bi bi-building me-2"></i>Companies</a>
    <div class="mt-auto">
      <a href="/" class="admin-nav-link"><i class="bi bi-arrow-left me-2"></i>View Site</a>
      <button id="logout-btn" class="admin-nav-link btn border-0 w-100 text-start" style="color:var(--text-muted)">
        <i class="bi bi-box-arrow-right me-2"></i>Logout
      </button>
    </div>
  </div>
  <div class="admin-main">
    <div id="tab-projects"></div>
    <div id="tab-skills" class="d-none"></div>
    <div id="tab-companies" class="d-none"></div>
  </div>
</div>

<!-- Edit/Add Modal -->
<div class="modal fade" id="adminModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="adminModalTitle">Edit</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="adminModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="adminModalSave">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/data.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
